<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="400" height="400" rx="56" fill="url(#bg)"/>

  <!-- Shield outline -->
  <path d="M200 60 L320 116 L320 212 Q320 302 200 348 Q80 302 80 212 L80 116 Z"
        fill="url(#shieldFill)" stroke="url(#accent1)" stroke-width="5" stroke-linejoin="round"/>

  <!-- Shield inner highlight line -->
  <path d="M200 76 L304 125 L304 212 Q304 292 200 334 Q96 292 96 212 L96 125 Z"
        fill="none" stroke="url(#accent2)" stroke-width="1.5" stroke-linejoin="round" opacity="0.3"/>

  <!-- Central hexagon (blockchain/crypto motif) -->
  <polygon points="200,135 235,155 235,195 200,215 165,195 165,155"
           fill="none" stroke="url(#accent1)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Hexagon inner glow -->
  <polygon points="200,145 225,159 225,191 200,205 175,191 175,159"
           fill="none" stroke="url(#accent2)" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>

  <!-- Central crypto orb -->
  <circle cx="200" cy="175" r="12" fill="none" stroke="url(#accent1)" stroke-width="3"/>
  <circle cx="200" cy="175" r="4" fill="url(#accent1)"/>

  <!-- Three blockchain block dots -->
  <rect x="188" y="230" width="8" height="8" rx="2" fill="#10b981" opacity="0.8"/>
  <rect x="200" y="230" width="8" height="8" rx="2" fill="#06b6d4" opacity="0.8"/>
  <rect x="212" y="230" width="8" height="8" rx="2" fill="#10b981" opacity="0.8"/>

  <!-- Connecting line between dots -->
  <line x1="196" y1="234" x2="200" y2="234" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="208" y1="234" x2="212" y2="234" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>

  <!-- Network connection rays from shield -->
  <g stroke="url(#accent1)" stroke-width="1.5" opacity="0.4">
    <line x1="80" y1="200" x2="120" y2="200"/>
    <circle cx="72" cy="200" r="3" fill="#10b981" opacity="0.5"/>
    <line x1="280" y1="200" x2="320" y2="200"/>
    <circle cx="328" cy="200" r="3" fill="#06b6d4" opacity="0.5"/>
    <line x1="200" y1="60" x2="200" y2="90"/>
    <circle cx="200" cy="52" r="3" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- Centered star badge -->
  <g transform="translate(200,278)">
    <polygon points="0,-14 4,-5 13,-5 6,1 8,11 0,6 -8,11 -6,1 -13,-5 -4,-5"
             fill="none" stroke="url(#accent2)" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>
